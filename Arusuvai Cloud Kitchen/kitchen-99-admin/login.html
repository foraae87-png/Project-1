<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Arusuvai</title>
  <link rel="stylesheet" href="/kitchen-99-admin/assets/admin.css">
</head>
<body class="adm">
  <div class="adm-login">
    <div class="adm-login__card">
      <div class="adm-login__logo">
        <div>
          <h1>Arusuvai Admin</h1>
          <small>Secure Login</small>
        </div>
      </div>

      <div class="adm-login__error" id="errorMsg"></div>

      <form id="loginForm">
        <div class="adm-form-group">
          <label for="password">Admin Password</label>
          <input class="adm-input" type="password" id="password" name="password" placeholder="••••••••" required autofocus>
        </div>
        <button type="submit" class="adm-btn adm-btn--primary adm-btn--block">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = e.target.querySelector('button');
      
      errorMsg.classList.remove('show');
      btn.textContent = 'Authenticating...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const contentType = res.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          throw new Error('Server returned an invalid response (HTML instead of JSON). This means your Node.js backend is not running. Static hosting like SPCK Editor or GitHub Pages cannot run the admin panel.');
        }

        let data;
        try {
          data = await res.json();
        } catch (e) {
          throw new Error('Failed to parse server response. Ensure you are running "node server.js".');
        }
        
        if (res.ok && data.success) {
          localStorage.setItem('csrf_token', data.csrfToken);
          if (data.token) localStorage.setItem('admin_token', data.token);
          window.location.href = '/kitchen-99-admin';
        } else {
          errorMsg.textContent = data.error || 'Invalid password.';
          errorMsg.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (err) {
        errorMsg.textContent = 'Error: ' + err.message;
        errorMsg.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>

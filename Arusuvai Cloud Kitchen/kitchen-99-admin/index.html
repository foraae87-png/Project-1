<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Arusuvai</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/kitchen-99-admin/assets/admin.css">
  <script src="/kitchen-99-admin/js/app.js" type="module"></script>
</head>
<body class="adm">
  <aside class="adm-sidebar" id="sidebar">
    <div class="adm-sidebar__brand">
      <img src="/logo.png" alt="Arusuvai" onerror="this.src='https://via.placeholder.com/36/C46B28/FFFFFF?text=A'">
      <div><h1>Arusuvai</h1><small>Admin Panel</small></div>
    </div>
    <nav class="adm-nav" id="mainNav">
      <div class="adm-nav__section">Content</div>
      <a href="#/dashboard" class="adm-nav__link active" data-nav="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg><span>Dashboard</span>
      </a>
      <a href="#/hero" class="adm-nav__link" data-nav="hero">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>Hero Section</span>
      </a>
      <a href="#/about" class="adm-nav__link" data-nav="about">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span>About Us</span>
      </a>
      <a href="#/menu" class="adm-nav__link" data-nav="menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11h18M5 11a7 7 0 0 1 14 0M12 18a2 2 0 0 0 2-2v-2h-4v2a2 2 0 0 0 2 2Z"/></svg><span>Menu Manager</span>
      </a>
      <a href="#/subscriptions" class="adm-nav__link" data-nav="subscriptions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M8 4v4M16 4v4"/></svg><span>Meal Plans</span>
      </a>
      <a href="#/corporate" class="adm-nav__link" data-nav="corporate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg><span>Corporate</span>
      </a>
      <a href="#/gallery" class="adm-nav__link" data-nav="gallery">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Gallery</span>
      </a>
      <a href="#/testimonials" class="adm-nav__link" data-nav="testimonials">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-9M14 17H5M17 7a3 3 0 1 0-6 0M7 17a3 3 0 1 0 6 0"/></svg><span>Testimonials</span>
      </a>
      <a href="#/announcements" class="adm-nav__link" data-nav="announcements">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg><span>Announcements</span>
      </a>
      <a href="#/faq" class="adm-nav__link" data-nav="faq">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17"/></svg><span>FAQ</span>
      </a>
      <div class="adm-nav__section">Configuration</div>
      <a href="#/business" class="adm-nav__link" data-nav="business">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6"/></svg><span>Business Details</span>
      </a>
      <a href="#/social" class="adm-nav__link" data-nav="social">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/></svg><span>Social Media</span>
      </a>
      <a href="#/seo" class="adm-nav__link" data-nav="seo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>SEO Settings</span>
      </a>
      <div class="adm-nav__section">System</div>
      <a href="#/media" class="adm-nav__link" data-nav="media">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Media Library</span>
      </a>
      <a href="#/backup" class="adm-nav__link" data-nav="backup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span>Backup</span>
      </a>
    </nav>
    <div class="adm-sidebar__foot">
      <button class="btn-logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="adm-overlay" id="overlay"></div>

  <div class="adm-main">
    <header class="adm-topbar">
      <div class="adm-flex">
        <button class="adm-menu-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h2 id="pageTitle">Loading...</h2>
      </div>
      <div class="adm-topbar__right">
        <button class="adm-theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
        </button>
        <div class="adm-user">
          <div class="adm-user__avatar">A</div>
          <span>Admin</span>
        </div>
      </div>
    </header>

    <main class="adm-content" id="appContent">
      <!-- Dynamic Views Loaded Here -->
    </main>
  </div>

  <div id="toast" class="adm-toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toastMsg">Saved</span>
  </div>

</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C46B28"/>
      <stop offset="1" stop-color="#A4541E"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4E7D4E"/>
      <stop offset="1" stop-color="#3A5F3A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Banana leaf ellipse -->
  <ellipse cx="256" cy="300" rx="170" ry="120" fill="url(#leaf)" opacity="0.92"/>
  <ellipse cx="256" cy="300" rx="170" ry="120" fill="none" stroke="#5C9A5C" stroke-width="3" opacity="0.5"/>
  <!-- Leaf vein -->
  <path d="M96 300 Q256 280 416 300" fill="none" stroke="#6FAE6F" stroke-width="2.5" opacity="0.5"/>
  <!-- Rice mound -->
  <ellipse cx="256" cy="285" rx="78" ry="34" fill="#FFFAF0"/>
  <ellipse cx="256" cy="278" rx="78" ry="34" fill="#FFFFFF"/>
  <!-- Sambar bowl -->
  <circle cx="170" cy="300" r="34" fill="#D9873A"/>
  <circle cx="170" cy="298" r="30" fill="#E89A4F"/>
  <!-- Chutney -->
  <circle cx="342" cy="300" r="30" fill="#F7E7CE"/>
  <circle cx="342" cy="298" r="26" fill="#FFFFFF"/>
  <!-- Dosa roll -->
  <rect x="232" y="250" width="48" height="22" rx="11" fill="#E8C77A"/>
  <rect x="236" y="248" width="40" height="18" rx="9" fill="#F0D590"/>
  <!-- Steam -->
  <path d="M236 232 Q240 216 232 200 Q228 188 236 172" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <path d="M272 236 Q276 220 268 204 Q264 192 272 176" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <!-- A monogram -->
  <text x="256" y="470" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="700" fill="#FFFDF9">A</text>
</svg>
